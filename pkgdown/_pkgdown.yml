# This is the configuration for the mizer website using the pkgdown package.

home:
  title: Multi-Species Dynamic Size Spectrum Modelling in R
  description: Mizer is an R package to create and run dynamic multi-species size-spectrum models of fish communities that are subject to fishing.
  sidebar:
    structure: [links, citation, community, license, toc]

url: https://sizespectrum.org/mizer

authors:
  Julia Blanchard:
    href: http://www.utas.edu.au/profiles/staff/imas/julia-blanchard
  Ken Andersen:
    href: https://ken.haste.dk/
  Gustav Delius:
    href: https://www.york.ac.uk/maths/staff/gustav-delius/

template:
  bootstrap: 5
  bootswatch: cerulean
  light-switch: true
  math-rendering: mathjax
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "mizer: Multi-Species Size Spectrum Modelling in R"
    twitter:
      site: "@mizer_model"
      card: summary

toc:
  depth: 3

navbar:
  structure:
    left: [intro, course, articles, reference, news, publications]
    right: [ai, search, blog, twitter, github, lightswitch]
  components:
    home: ~
    publications:
      text: Publications
      href: articles/publications.html
    course:
      text: Course
      href: https://mizer.course.sizespectrum.org
    blog:
      text: Blog
      href: https://blog.mizer.sizespectrum.org
    twitter:
       icon: "fab fa-twitter fa-lg"
       href: https://twitter.com/mizer_model
       aria-label: Twitter
    ai:
      icon: fa-robot
      text: "Ask AI"
      href: https://notebooklm.google.com/notebook/6aa51f75-d1a8-4140-9180-84532ef5f821

articles:
- title: Model types
  navbar: Model types
  contents:
  - single_species_size-spectrum_dynamics
  - community_model
  - trait_model
  - multispecies_model
  - model_description
- title: Cheat sheets
  navbar: Cheat sheets
  contents:
  - cheatsheet-analysis-and-plotting
- title: Extending mizer
  navbar: Extending mizer
  contents:
  - extending-mizer
  - using-extension-packages
  - creating-extension-packages
- title: Technical articles
  navbar: Technical articles
  contents:
  - cohort_dynamics_and_diffusion
  - numerical_details
  - default_parameters
  - fft
  - analytic_test
- title: internal
  contents:
  - mizer_vignette
  - publications
  - plotting

reference:
- title: Creating a new model
  description: Mizer allows the easy set-up of four different types of models,
    of increasing level of complexity. See
    https://sizespectrum.org/mizer/articles/mizer.html#size-spectrum-models
    for a description of these model types.
  contents:
  - newSingleSpeciesParams
  - newCommunityParams
  - newTraitParams
  - newMultispeciesParams
- title: Changing model parameters
  description: After you have created a model, you will want to make changes to it
    while tuning the model and for investigating the impact of changes in parameters.
  contents:
  - species_params
  - gear_params
  - initialN
  - initialNResource
  - initial_effort
  - addSpecies
  - removeSpecies
  - renameSpecies
  - renameGear
  - expandSizeGrid
  - markBackground
  - removeBackgroundSpecies
  - use_predation_diffusion
  - second_order_w
- title: Steady state tuning
  description: The first task after creating a multi-species model is to tune
    the model parameters so that in its steady state the model reproduces
    average observed growth rates, abundances and fisheries yields.
  contents:
  - steady
  - steadySingleSpecies
  - matchGrowth
  - plotBiomassObservedVsModel
  - calibrateBiomass
  - calibrateNumber
  - matchBiomasses
  - matchNumbers
  - plotYieldObservedVsModel
  - scaleModel
  - scaleRates
- title: Dynamics tuning
  description: After tuning the steady state, you need to tune the sensitivity
    of the dynamics to perturbations away from the steady state. The following
    functions allow you to change the model without destroying the steady state.
  contents:
  - setBevertonHolt
  - setResource
- title: Sharing models
  description: Save a model together with its metadata so it can be archived or
    shared with other users.
  contents:
  - setMetadata
  - saveParams
- title: Running simulations
  description: Project a `MizerParams` object forward in time to produce a
    `MizerSim` object containing the full time series of size spectra.
  contents:
  - project
  - projectToSteady
- title: Accessing results
  description: Extract the raw arrays stored in a `MizerSim` object, such as
    species and resource size spectra and fishing effort at each saved time step,
    or extract the ecosystem state as a `MizerParams` object.
  contents:
  - getParams
  - initialParams
  - finalParams
  - "N"
  - NResource
  - finalN
  - getEffort
  - getTimes
- title: Analysing results
  description: Calculate summary quantities from a `MizerSim` object, such as
    biomass, yield, growth, and feeding level, averaged or disaggregated over
    time, species, or size.
  contents:
  - summary_functions
  - has_concept("summary functions")
  - getFeedingLevel
  - getCriticalFeedingLevel
- title: Calculating rates
  description: Calculate instantaneous ecological rates from a `MizerParams`
    object, such as encounter rate, predation mortality, or somatic growth rate.
  contents:
  - getRates
  - has_concept("rate functions")
- title: Calculating indicators
  description: Calculate ecological indicators from a `MizerSim` object, such as
    mean weight, mean maximum weight, and the Large Fish Index.
  contents:
  - indicator_functions
  - has_concept("functions for calculating indicators")
- title: Plotting results
  description: Visualise size spectra, biomass and yield trajectories, growth
    curves, and comparisons of model output with observations.
  contents:
  - plotting_functions
  - plot
  - plotHover
  - plot2
  - plotRelative
  - animate
  - plotSpectra
  - plotSpectra2
  - plotSpectraRelative
  - plotCDF
  - plotCDF2
  - plotBiomass
  - plotPredMort
  - plotFeedingLevel
  - plotYield
  - plotYieldGear
  - plotFMort
  - plotMizerParams
  - plotMizerSim
  - plotDiet
  - plotGrowthCurves
  - addPlot
  - plotBiomassObservedVsModel
  - plotYieldObservedVsModel
  - setColours
  - setLinetypes
- title: Setting custom rates
  desc: You can override the rates mizer calculates from the species parameters
    and gear parameters with your own rate arrays.
  contents:
  - setParams
  - setPredKernel
  - getPredKernel
  - setSearchVolume
  - setInteraction
  - setMaxIntakeRate
  - setMetabolicRate
  - setExtDiffusion
  - setExtMort
  - setExtEncounter
  - setReproduction
  - setFishing
- title: Extending Mizer
  desc: See [Extending mizer](https://sizespectrum.org/mizer/articles/extending-mizer.html),
   [Using mizer extension packages](https://sizespectrum.org/mizer/articles/using-extension-packages.html)
    and [Creating a mizer extension package](https://sizespectrum.org/mizer/articles/creating-extension-packages.html) for more details.
  contents:
  - setRateFunction
  - setComponent
  - initialNOther<-
  - NOther
  - has_concept("extension tools")
  - customFunction
- title: Predation kernels
  description: Functions that determine the size preference of predators for prey,
    i.e. the probability of a predator of a given size eating prey of a given size.
  contents:
  - has_concept("predation kernel")
- title: Fishing selectivity functions
  description: Functions that determine the size-selectivity of fishing gears,
    i.e. the proportion of fish of a given size that are retained by a gear.
  contents:
  - has_concept("selectivity functions")
- title: Resource dynamics
  description: Functions governing the time evolution of the background resource
    spectrum, together with functions for getting and setting resource parameters.
  contents:
  - has_concept("resource dynamics functions")
  - has_concept("resource parameters")
  - resource_params
- title: Reproduction functions
  description: Functions governing the density-dependent relationship between the
    energy invested in reproduction and the actual egg production rate.
  contents:
  - has_concept("functions calculating density-dependent reproduction rate")
  - getReproductionLevel
  - getRequiredRDD
- title: Internal rate functions
  description: These functions are used by project() to calculate
    instantaneous rates at each time step. You should use the get...()
    functions instead of the mizer...() functions.
  contents:
  - mizerRates
  - starts_with("mizer")
  - projectRDD
  - -mizer
- title: Internal helper functions
  description: Utility functions used internally by mizer that may also be useful
    for users building extensions or working with model objects directly.
  contents:
  - has_concept("helper")
  - defaults_edition
- title: Classes
  description: The S4 and S3 classes used by mizer, together with functions for
    constructing, inspecting, comparing, and validating them.
  contents:
  - mizer-package
  - MizerParams-class
  - summary.MizerParams
  - str.MizerParams
  - compareParams
  - "w"
  - validParams
  - MizerSim-class
  - summary.MizerSim
  - str.MizerSim
  - getSimParams
  - validSim
  - MizerSim
  - print
  - summary
  - str
  - as.data.frame
  - ArraySpeciesBySize
  - is.ArraySpeciesBySize
  - ArrayTimeBySpecies
  - is.ArrayTimeBySpecies
  - ArrayTimeBySpeciesBySize
  - is.ArrayTimeBySpeciesBySize
  - ArrayResourceBySize
  - is.ArrayResourceBySize
  - ArrayTimeByResourceBySize
  - is.ArrayTimeByResourceBySize
- title: Example parameter sets
  desc: More example parameter sets are available via
    <https://sizespectrum.org/mizerExamples>
  contents:
  - NS_params
  - NS_species_params
  - NS_species_params_gears
  - NS_interaction
  - NS_sim
- title: Deprecated
  desc: These functions are available for backwards compatibility with earlier
    versions of mizer
  contents:
  - has_concept("deprecated")

redirects:
